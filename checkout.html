<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Checkout | AK Electronics</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
    <style>
      .checkout-container {
        max-width: 500px;
        margin: 40px auto;
        background: var(--card-bg);
        padding: 30px;
        border-radius: 15px;
        border: 1px solid var(--border);
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
      }
      .total-box {
        background: var(--bg-color);
        padding: 20px;
        border-radius: 10px;
        text-align: center;
        margin-bottom: 25px;
        border: 2px dashed var(--primary);
      }
    </style>
  </head>
  <body class="store-body">
    <nav class="navbar">
      <a href="{{ url_for('index') }}" class="brand-logo">
        AK <span>Electronics</span>
      </a>

      <div class="hamburger-menu" id="hamburger">
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
      </div>

      <div class="nav-content" id="navContent">
        <button class="close-menu" id="closeBtn">×</button>
        <div class="theme-switch-wrapper">
          <label class="theme-switch">
            <input type="checkbox" id="checkbox" onclick="toggleTheme()" />
            <div class="slider"></div>
          </label>
        </div>

        <a href="{{ url_for('index') }}" class="nav-link-btn">🏠 Home</a>
        <a href="{{ url_for('cart') }}" class="nav-link-btn">🛒 Cart</a>
        
        <form action="{{ url_for('logout') }}" method="GET" class="logout-form">
          <button type="submit" class="btn-logout">Logout</button>
        </form>
      </div>
    </nav>

    <main class="store-container">
      <div class="auth-card" style="margin: 0 auto; max-width: 600px;">
        <h2 style="margin-bottom: 1.5rem; text-align: center; border: none;">
          Secure Checkout 🔒
        </h2>

        <div style="background: var(--bg-color); padding: 1.5rem; border-radius: 20px; border: 1px solid var(--border); text-align: center; margin-bottom: 2rem;">
          <p style="color: var(--text-muted); font-size: 0.9rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px;">
            Order Total
          </p>
          <h3 style="color: var(--primary); font-size: 2.5rem; margin-top: 5px; font-weight: 800;">
            ₹{{ total }}
          </h3>
        </div>

        <form id="checkoutForm" action="{{ url_for('checkout') }}" method="POST">
          <div class="input-group">
            <label>Phone Number</label>
            <div style="display: flex; gap: 12px">
              <select id="countryCode" required style="width: 120px;">
                <option value="+91" selected>🇮🇳 +91</option>
                <option value="+1">🇺🇸 +1</option>
                <option value="+44">🇬🇧 +44</option>
              </select>

              <input
                type="tel"
                id="phoneNumber"
                placeholder="9876543210"
                required
                oninput="this.value = this.value.replace(/[^0-9]/g, '')"
                style="flex: 1;"
              />
            </div>
            <input type="hidden" name="phone" id="fullPhone" />
          </div>

          <div class="input-group">
            <label>Delivery Address</label>
            <textarea
              name="address"
              rows="4"
              placeholder="Enter your full home or office address..."
              required
            ></textarea>
          </div>

          <button type="submit" class="primary-btn" style="width: 100%; margin-top: 1rem; padding: 16px; font-size: 1.1rem; gap: 10px;">
            Proceed to Payment 💳
          </button>
        </form>
        
        <p style="text-align: center; margin-top: 1.5rem; font-size: 0.85rem; color: var(--text-muted);">
          By placing an order, you agree to AK Electronics' Terms of Service.
        </p>
      </div>
    </main>

    <script>
      // Merge code and number on submit
      document
        .getElementById("checkoutForm")
        .addEventListener("submit", function () {
          const code = document.getElementById("countryCode").value;
          const number = document.getElementById("phoneNumber").value;
          document.getElementById("fullPhone").value = code + " " + number;
        });

      const hamburger = document.getElementById('hamburger');
      const navContent = document.getElementById('navContent');
      const closeBtn = document.getElementById('closeBtn');

      function toggleMenu() {
        navContent.classList.toggle("active");
        hamburger.classList.toggle("active");
      }

      if (hamburger) hamburger.addEventListener('click', toggleMenu);
      if (closeBtn) closeBtn.addEventListener('click', toggleMenu);

      function toggleTheme() {
        const checkbox = document.getElementById("checkbox");
        let newTheme = checkbox.checked ? "dark" : "light";
        document.documentElement.setAttribute("data-theme", newTheme);
        localStorage.setItem("theme", newTheme);
      }

      const savedTheme = localStorage.getItem("theme") || "light";
      document.documentElement.setAttribute("data-theme", savedTheme);
      const themeCheckbox = document.getElementById("checkbox");
      if (themeCheckbox) {
        themeCheckbox.checked = savedTheme === "dark";
      }
    </script>
  </body>
</html>
