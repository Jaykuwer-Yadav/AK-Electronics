<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Payment | AK Electronics</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .payment-card {
            max-width: 600px;
            margin: 40px auto;
            background: var(--card-bg);
            padding: 2.5rem;
            border-radius: 30px;
            box-shadow: var(--shadow);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(10px);
        }

        .payment-options {
            display: grid;
            gap: 15px;
            margin-top: 2rem;
        }

        .payment-option-label {
            display: flex;
            align-items: center;
            padding: 20px;
            border: 2px solid var(--border);
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            background: rgba(255, 255, 255, 0.02);
        }

        .payment-option-label:hover {
            border-color: var(--primary);
            background: rgba(0, 102, 255, 0.05);
        }

        .payment-option-label input[type="radio"] {
            display: none;
        }

        .payment-option-label input[type="radio"]:checked + .option-content {
            color: var(--primary);
        }

        .payment-option-label input[type="radio"]:checked ~ .check-icon {
            opacity: 1;
            transform: scale(1);
        }

        .payment-option-label.active {
            border-color: var(--primary);
            background: rgba(0, 102, 255, 0.05);
            box-shadow: 0 0 0 4px rgba(0, 102, 255, 0.1);
        }

        .option-icon {
            font-size: 1.8rem;
            margin-right: 15px;
            min-width: 40px;
            text-align: center;
        }

        .option-details {
            flex: 1;
        }

        .option-title {
            font-weight: 700;
            font-size: 1.1rem;
            display: block;
        }

        .option-desc {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .check-icon {
            position: absolute;
            right: 20px;
            color: var(--primary);
            font-size: 1.2rem;
            opacity: 0;
            transform: scale(0.5);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* UPI Section */
        #upi-details, #netbanking-details {
            display: none;
            margin-top: 15px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.03);
            border-radius: 15px;
            text-align: center;
        }

        [data-theme="dark"] #upi-details, [data-theme="dark"] #netbanking-details {
            background: rgba(255, 255, 255, 0.03);
        }

        .qr-placeholder {
            width: 180px;
            height: 180px;
            margin: 10px auto;
            background: white;
            padding: 10px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #ddd;
        }

        .qr-placeholder img {
            max-width: 100%;
        }

        .order-summary-mini {
            background: var(--bg-color);
            padding: 1.5rem;
            border-radius: 20px;
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="/" class="brand-logo">AK <span>Electronics</span></a>
    </nav>

    <div class="store-container">
        <div class="payment-card">
            <h2 style="font-size: 1.8rem; border: none; margin-bottom: 0.5rem;">Choose Payment Method</h2>
            <p style="color: var(--text-muted); margin-bottom: 2rem;">Securely complete your transaction for Order #{{ order.tracking_number }}</p>

            <div class="order-summary-mini">
                <div>
                    <span style="font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase;">Amount to Pay</span>
                    <h3 style="font-size: 1.5rem; color: var(--primary);">₹{{ order.total_amount }}</h3>
                </div>
                <div style="text-align: right;">
                    <span style="font-size: 0.8rem; color: var(--text-muted);">Secure Checkout</span>
                    <div style="font-size: 1.2rem;">🔒</div>
                </div>
            </div>

            <form action="{{ url_for('process_payment', order_id=order.id) }}" method="POST">
                <div class="payment-options">
                    <!-- COD -->
                    <label class="payment-option-label" onclick="selectOption(this, 'COD')">
                        <input type="radio" name="payment_method" value="COD" required checked>
                        <div class="option-icon">💵</div>
                        <div class="option-details">
                            <span class="option-title">Cash on Delivery</span>
                            <span class="option-desc">Pay at your doorstep when products arrive</span>
                        </div>
                        <div class="check-icon">✓</div>
                    </label>

                    <!-- UPI -->
                    <label class="payment-option-label" onclick="selectOption(this, 'UPI')">
                        <input type="radio" name="payment_method" value="UPI">
                        <div class="option-icon">⚡</div>
                        <div class="option-details">
                            <span class="option-title">UPI Payment</span>
                            <span class="option-desc">Instant payment via GPay, PhonePe, Paytm</span>
                        </div>
                        <div class="check-icon">✓</div>
                    </label>

                    <div id="upi-details">
                        <p style="font-size: 0.9rem; margin-bottom: 10px;">Scan QR to pay ₹{{ order.total_amount }}</p>
                        <div class="qr-placeholder">
                            <!-- Placeholder QR using a public API or static image -->
                            <img src="https://api.qrserver.com/v1/create-qr-code/?size=160x160&data=upi://pay?pa=merchant@upi&pn=AK%20Electronics&am={{ order.total_amount }}&cu=INR" alt="UPI QR">
                        </div>
                        <p style="font-size: 0.8rem; color: var(--text-muted); margin-top: 10px;">ID: merchant@upi</p>
                    </div>

                    <!-- Netbanking -->
                    <label class="payment-option-label" onclick="selectOption(this, 'Netbanking')">
                        <input type="radio" name="payment_method" value="Netbanking">
                        <div class="option-icon">🏦</div>
                        <div class="option-details">
                            <span class="option-title">Netbanking</span>
                            <span class="option-desc">All major Indian banks supported</span>
                        </div>
                        <div class="check-icon">✓</div>
                    </label>

                    <div id="netbanking-details">
                        <select class="nav-link-btn" style="width: 100%; height: 50px; background: white; color: black;" onclick="event.stopPropagation()">
                            <option value="">Select your bank...</option>
                            <option value="SBI">State Bank of India</option>
                            <option value="HDFC">HDFC Bank</option>
                            <option value="ICICI">ICICI Bank</option>
                            <option value="AXIS">Axis Bank</option>
                        </select>
                    </div>
                </div>

                <button type="submit" class="primary-btn" style="width: 100%; margin-top: 2rem; height: 55px; font-size: 1.1rem;">
                    Complete Purchase
                </button>
            </form>
        </div>
    </div>

    <script>
        function selectOption(element, type) {
            // Reset all
            document.querySelectorAll('.payment-option-label').forEach(el => el.classList.remove('active'));
            document.getElementById('upi-details').style.display = 'none';
            document.getElementById('netbanking-details').style.display = 'none';

            // Set current
            element.classList.add('active');
            
            if (type === 'UPI') {
                document.getElementById('upi-details').style.display = 'block';
            } else if (type === 'Netbanking') {
                document.getElementById('netbanking-details').style.display = 'block';
            }
        }

        // Initialize first
        window.onload = () => {
             document.querySelector('.payment-option-label').classList.add('active');
        }
    </script>
</body>
</html>
